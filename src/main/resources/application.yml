cryptopal:
  data-source: binance
  session:
    ttl-seconds: 3600

  market:
    tracked-symbols:
      - BTC
      - ETH
      - SOL
      - AVAX
      - XRP
      - BNB
  binance:
    base-url: https://api.binance.com
    symbols:
      - BTCUSDT
      - ETHUSDT
      - SOLUSDT
      - AVAXUSDT
      - XRPUSDT
      - BNBUSDT
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
  ai:
    context:
      transaction-limit: 15
      price-trend-points: 24
      history-turns: 6
      history-ttl-seconds: 1800
    rate-limit:
      max-requests: 8
      window-seconds: 60