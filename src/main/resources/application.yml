spring:
  application:
    name: CryptoPal

  # Configure SQL initialization correctly (schema is for CREATE TABLE, none tells hibernate not to interfere)
  sql:
    init:
      mode: always
      schema-locations: file:db/init.sql
  jpa:
    hibernate:
      ddl-auto: none

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
    jpa:
      repositories:
        bootstrap-mode: default
      autoconfigure:
        exclude:
          - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

server:
  port: ${SERVER_PORT}

# Custom application-specific configuration tree
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: ${GEMINI_MODEL}

cryptopal:
  data-source: binance
  session:
    ttl-seconds: 3600

  market:
    tracked-symbols:
      - BTC
      - ETH
  binance:
    base-url: https://api.binance.tr
    symbols:
      - BTCUSDT
      - ETHUSDT
    connect-timeout-ms: 3000
    read-timeout-ms: 5000